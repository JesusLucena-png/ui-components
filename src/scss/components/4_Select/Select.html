<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../../css/main.css">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>
<body>
    <main>
        <!-- ==========================================================
            BUTTON COMPONENTS
            Variantes básicas del sistema de botones.
        ========================================================== -->

        <!-- ==========================================================
            ICON + TEXT BUTTON
            Botón con icono al inicio y texto.
        ========================================================== -->
        <div class="container">

            <div id="Select" class="select">

                <button id="buton" class="select-trigger">
                    <span>Select a work area</span><i class="bx bx-user"></i>
                </button>

                <div class="select-menu">

                    <div class="select-item" data-value="1">
                        <span>Select a work area 3</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="2">
                        <span>Select a work area 2</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="3">
                        <span>Select a work area 1</span><i class="bx bx-user"></i>
                    </div>

                </div>

            </div>

            <div id="Select2" class="select">

                <button id="buton2" class="select-trigger">
                    <span>Select a work area</span><i class="bx bx-user"></i>
                </button>

                <div class="select-menu">

                    <div class="select-item" data-value="1">
                        <span>Select a work area 3</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="2">
                        <span><i class="bx bx-user"></i>Select a work area 2</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="3">
                        <span>Select a work area 1</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="3">
                        <span>Select a work area 1</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="3">
                        <span>Select a work area 1</span><i class="bx bx-user"></i>
                    </div>

                    <div class="select-item" data-value="3">
                        <span>Select a work area 1</span><i class="bx bx-user"></i>
                    </div>

                </div>

            </div>

        </div>


    </main>
    <script>

        select("Select","buton",".select-item");
        select("Select2","buton2",".select-item");

        function select(id, button, select_item){
            
            const Select = document.getElementById(id);
            const buton  = document.getElementById(button);

            buton.addEventListener('click', () => {
                Select.classList.toggle('active');
            })

            const st_item = Select.querySelectorAll(select_item);

            st_item.forEach(item => {
                item.addEventListener('click', () => {
                    buton.innerHTML = (item.innerHTML);
                    Select.classList.remove('active');
                    return(item.getAttribute("data-value"));
                })
            });
        }

    </script>
</body>
</html>
